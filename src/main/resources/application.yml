server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

distributed-lock:
  enabled: true
  fail-open: false
  backend: redis
  default-lease-ms: 30000
  owner-id: ${spring.application.name:distributed-lock}
  retry:
    enabled: true
    initial-backoff-ms: 50
    max-backoff-ms: 2000
    jitter: true
